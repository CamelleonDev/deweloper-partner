services:
  app:
    build:
      context: .
      target: cli
    image: deweloper-partner-app
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-deweloper_partner}
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  queue:
    image: deweloper-partner-app
    build:
      context: .
      target: cli
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    command: php artisan queue:work redis --sleep=3 --tries=3
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      - app
      - mysql
      - redis

  scheduler:
    image: deweloper-partner-app
    build:
      context: .
      target: cli
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      - app
      - mysql
      - redis

volumes:
  mysql-data:
  redis-data:
  vendor:
